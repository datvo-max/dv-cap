<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quét QR Thẻ Căn Cước</title>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h2>Quét Mã QR Căn Cước</h2>
  <h4>Phiên bản 1.0.3</h4>

  <div class="btn-group">
    <button class="btn-scan" id="start-btn" onclick="startScanner()">Mở Camera Trực Tiếp</button>
    <button class="btn-stop" id="stop-btn" onclick="stopScanner()">Đóng Camera</button>

    <button class="btn-scan" style="background-color: #ff9800;"
      onclick="document.getElementById('file-input').click()">Chụp Ảnh Thẻ để Quét</button>
    <input type="file" id="file-input" accept="image/*" capture="environment" style="display: none;"
      onchange="scanImage(event)">

    <button class="btn-export" onclick="exportExcel()">Xuất File Excel</button>
  </div>

  <div id="reader"></div>

  <div class="table-container">
    <table id="data-table">
      <thead>
        <tr>
          <th>STT</th>
          <th>Số CCCD</th>
          <th>Họ và Tên</th>
          <th>Ngày Sinh</th>
          <th>Giới Tính</th>
          <th>Địa Chỉ</th>
        </tr>
      </thead>
      <tbody id="table-body">
      </tbody>
    </table>
  </div>

  <script src="script.js"></script>
</body>

</html>
