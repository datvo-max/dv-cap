<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quét QR Thẻ Căn Cước</title>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h2>Quét Mã QR Căn Cước</h2>
  <h4>Phiên bản 1.1.2</h4>

  <div class="stats-container">
    <h3>Tổng số đã quét: <span id="total-count">0</span></h3>
  </div>

  <div class="btn-group">
    <button class="btn-device" id="device-btn" onclick="toggleDeviceScanner()">Nhận Từ Máy Quét (PC)</button>
    <button class="btn-scan" id="start-btn" onclick="startScanner()">Mở Camera Tự Động</button>
    <button class="btn-stop" id="stop-btn" onclick="stopScanner()">Đóng Camera</button>

    <button class="btn-scan" style="background-color: #ff9800;"
      onclick="document.getElementById('file-input').click()">Chụp Ảnh Thẻ</button>
    <input type="file" id="file-input" accept="image/*" capture="environment" style="display: none;"
      onchange="scanImage(event)">

    <button class="btn-export" onclick="exportExcel()">Xuất Excel</button>
    <button class="btn-delete" onclick="clearData()">Xóa Dữ Liệu</button>
  </div>
  <div id="scanner-display-container" style="display: none;">
    <div class="scanner-status">Đang chờ dữ liệu từ máy quét...</div>
    <textarea id="scanner-display" readonly placeholder="Dữ liệu sẽ chạy vào đây..."></textarea>
  </div>

  <div id="reader"></div>

  <div class="table-container">
    <table id="data-table">
      <thead>
        <tr>
          <th>STT</th>
          <th>Loại thẻ</th>
          <th>Số CCCD</th>
          <th>Số CMND cũ</th>
          <th>Họ và Tên</th>
          <th>Ngày Sinh</th>
          <th>Giới Tính</th>
          <th>Địa Chỉ</th>
          <th>Ngày cấp</th>
          <th>Họ Tên Vợ/Chồng</th>
          <th>Họ Tên Cha</th>
          <th>Họ Tên Mẹ</th>
        </tr>
      </thead>
      <tbody id="table-body">
      </tbody>
    </table>
  </div>

  <div id="toast-container"></div>
  <script src="script.js?v=10"></script>
</body>

</html>
